spring.application.name=team-matching

# 1. DB 연결 설정 
spring.datasource.url=jdbc:mysql://localhost:3306/team_matching?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=update

# 디버깅용
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MariaDB 방언 설정
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# JWT 설정
jwt.secret=team-matching-secret-key-must-be-at-least-32-bytes-long
jwt.expiration-ms=86400000